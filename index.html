<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Demo GitHub</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
}

.container{
    margin-top:100px;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#24292e;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0366d6;
}

</style>

</head>

<body>

<div class="container">

<h1>Demo de GitHub</h1>

<p>Esta página fue subida usando Git y GitHub</p>

<button onclick="mensaje()">Haz clic aquí</button>

<p id="texto"></p>

</div>

<script>

function mensaje(){
    document.getElementById("texto").innerHTML = "Hola esta página viene desde GitHub";
}

</script>

</body>
</html>
